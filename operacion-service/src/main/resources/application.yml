server:
  port: 8084

spring:
  application:
    name: operacion-service
  config:
    import: "optional:configserver:http://localhost:8888"
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/novabank_operaciones
    username: postgres
    password: "745507"
    pool:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

resilience4j:
  circuitbreaker:
    instances:
      exchangeRateService:
        registerHealthIndicator: true
        slidingWindowSize: 5
        minimumNumberOfCalls: 3
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 2
        automaticTransitionFromOpenToHalfOpenEnabled: true

  retry:
    instances:
      exchangeRateService:
        maxAttempts: 3
        waitDuration: 500ms
